# Required secrets:
#   KUBE_CONFIG   - Base64‑encoded kubeconfig with permissions to update the deployment in the target cluster.
#   (GITHUB_TOKEN is provided automatically by GitHub Actions; no manual secret needed.)

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write   # needed for pushing to GHCR
  id-token: write   # not used here but kept for future OIDC auth

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image-tags: ${{ steps.set-tags.outputs.tags }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tags
        id: set-tags
        run: |
          echo "tags=ghcr.io/Navneet072300/code-review:${GITHUB_SHA},ghcr.io/Navneet072300/code-review:latest" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.set-tags.outputs.tags }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository (required for Kustomize/manifest files if any)
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.30.0"

      - name: Decode kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBE_CONFIG" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Set image on Kubernetes deployment
        env:
          IMAGE: ghcr.io/Navneet072300/code-review:${{ github.sha }}
        run: |
          kubectl set image deployment/code-review code-review=$IMAGE --record

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/code-review --timeout=5m